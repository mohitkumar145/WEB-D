<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Say Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Simon Game</h1>
    <p class="Para">Press any button to start the game</p>
    <h3></h3>
    <div class="container">
        <div class="box1">
            <div class="btn red" id="red">1</div>
            <div class="btn blue" id="blue">3</div>

        </div>
        <div class="start">Start</div>

        <div class="box2">
            <div class="btn green" id="green">2</div>
            <div class="btn yellow" id="yellow">4</div>
        </div>
    </div>


    <script src="app.js"></script>
</body>

</html>
