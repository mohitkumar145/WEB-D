<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=a, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="Comp.css">
</head>

<body>
    <a href="https://getbootstrap.com/docs/5.3/components/buttons/">Bootsratps</a>

    <div class="container">

        <form class="mb-3" class="form-label"></form>
        <label for="Email">Email</label>
        <input type="text" id="Email" class="form-control" placeholder="Email"></input>

        <form class="mb-3" class="form-label"></form>
        <label for="Pass">Password</label>
        <input type="text" id="Pass" class="form-control" placeholder="Password"></input>

        <form class="mb-3" class="form-label"></form>
        <label for="Addr">Adrress</label>
        <input type="text" id="Addr" class="form-control-lg" placeholder="Address"></input>



        <div class="normal">

            <label for="Agree">Agree</label>
            <input type="checkbox" id="Agree">
        </div>


 
        <div class="mb-3 form-check">
            <input class="form-check-input" type="checkbox" id="checkChecked">
            <label class="form-check-label" for="checkChecked">Agree</label>
        </div>


        <div class="mb-3 form-check">
            <input class="form-check-input" type="radio" id="radio">
            <label class="form-check-label" for="radio">Yes/No</label>

        </div>

      <!-- Switch Basically it is also a different type of CheckBox -->
        <div class="form-check form-switch mg-3">
            <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
            <label class="form-check-label" for="switchCheckDefault">Default switch checkbox input</label>
        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
