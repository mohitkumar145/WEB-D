<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute</title>
    <link rel="stylesheet" href="Abs.css">
</head>

<body>

    <section>
        <h2>Static Demo</h2>
        <div></div>
        <div id="static"></div>
    </section>



    <section>
        <h2>Relative Demo</h2>
        <div>1st div</div>
        <div id="relative">2nd div</div>
        <div>3rd div</div>
    </section>


    <section>
        <h2>Absolute Demo</h2>
        <div>1st div</div>
        <div id="absolute">2nd div(Abs Wala)</div>
        <div>3rd div</div>
    </section>
    

</body>

</html>
