<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Hover Effect</title>
    <link rel="stylesheet" href="CE.css">

</head>

<body>
    <div class="card">
        <img src="man.jpg" alt="man">
        <div id="desc">
            <h3>Mohit Kumar</h3>
            <p> A B.tech Student</p>
        </div>

    </div>
    <div class="card">
        <img src="woman.jpg" alt="woman">
        <div id="desc">
            <h3>Kajal Kumari</h3>
            <p>A beautiful girl</p>
        </div>

    </div>
</body>

</html>
